workflows:
  android-apk-only:
    name: Android APK Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Create Android platform
        script: |
          flutter create --platforms=android .
          
      - name: Fix Gradle conflicts and JVM compatibility
        script: |
          echo "🔧 Fixing all Gradle issues..."
          
          # حذف فایل build.gradle.kts که با build.gradle تداخل دارد
          rm -f android/build.gradle.kts
          rm -f android/app/build.gradle.kts
          rm -f android/settings.gradle.kts
          
          # فایل build.gradle ریشه با تنظیمات subprojects برای یکسان‌سازی JVM در کل پروژه
          cat > android/build.gradle << 'EOF'
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
              
              // ✅ این بخش حیاتی است: jvmTarget را در تمام sub-projects (شامل tflite_flutter) یکسان می‌کند
              afterEvaluate { project ->
                  if (project.plugins.hasPlugin("org.jetbrains.kotlin.android") || project.plugins.hasPlugin("kotlin-android")) {
                      android {
                          compileOptions {
                              sourceCompatibility JavaVersion.VERSION_17
                              targetCompatibility JavaVersion.VERSION_17
                          }
                      }
                      tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                          kotlinOptions {
                              jvmTarget = "17"
                          }
                      }
                  }
              }
          }

          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          # فایل build.gradle اپ با compileSdk 36
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
          def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

          android {
              namespace "com.example.insect_detector"
              compileSdk 36
              ndkVersion flutter.ndkVersion

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }

              defaultConfig {
                  applicationId "com.example.insect_detector"
                  minSdk 21
                  targetSdk 36
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }

          flutter {
              source '../..'
          }
          EOF
          
          echo "✅ All Gradle issues fixed (JVM 17 + compileSdk 36 + kts removed)"
          
      - name: Copy AndroidManifest
        script: |
          cp custom_android/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          
      - name: Get Flutter packages
        script: |
          flutter pub get
          
      - name: Build Release APK
        script: |
          flutter build apk --release
          
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      
    publishing:
      email:
        recipients:
          - mokhtarpour.touraj@gmail.com
